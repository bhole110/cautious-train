<style>
:root{
  --bg:#060b10;
  --card:#101923;
  --text:#ffffff;
  --muted:#98a8b8;
  --accent1:#00c6ff;
  --accent2:#0072ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top,#102235 0%,#060b10 45%);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:var(--text);
}

.container{
  width:100%;
  max-width:420px;
}

.card{
  background:rgba(16,25,35,.95);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;
  padding:32px 24px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
}



.title{
  font-size:30px;
  font-weight:800;
  margin-bottom:10px;
  background:linear-gradient(90deg,#7ee8ff,#4da3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
  margin-bottom:28px;
}

.btn-wrap{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  padding:16px;
  border-radius:16px;
  text-decoration:none;
  font-size:16px;
  font-weight:700;
  color:#fff;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  transition:.25s ease;
  box-shadow:0 8px 25px rgba(0,114,255,.35);
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:'';
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:rgba(255,255,255,0.25);
  transform:skewX(-25deg);
  animation:shine 2.8s linear infinite;
}

.btn:hover{
  transform:translateY(-2px);
}

@keyframes shine{
  100%{
    left:150%;
  }
}

.info{
  margin-top:22px;
  font-size:12px;
  color:#7d8c9b;
  line-height:1.6;
}

.footer{
  margin-top:18px;
  text-align:center;
}

.footer a{
  color:#6ea8ff;
  text-decoration:none;
  font-size:13px;
}

@media(max-width:480px){

  .card{
    padding:28px 20px;
  }

  .title{
    font-size:26px;
  }

  .btn{
    font-size:15px;
    padding:15px;
  }
}
</style>

<body>

<div class="container">

    <div class="title">

    <div class="subtitle">
      Join our official Telegram community for updates and announcements.
    </div>

    <div class="btn-wrap">

      <a class="btn"
         href="https://t.me/+3stnN8ICyE5iMDc1"
         target="_self">JOIN TELEGRAM CHANNEL</a>

      <a class="btn"
         href="https://t.me/+3stnN8ICyE5iMDc1"
         target="_self">JOIN TELEGRAM CHANNEL</a>

    </div>

    <div class="info">
      Fast • Secure • Mobile Friendly
    </div>

  </div>

  <div class="footer">
    <a href="https://t.me/+3stnN8ICyE5iMDc1" target="_self">
      Contact Support
    </a>
  </div>

</div>

</body>
</html>
